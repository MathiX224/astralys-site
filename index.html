<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRALYS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#050816,#111827,#1e1b4b,#312e81,#050816);
background-size:400% 400%;
animation:galaxy 15s ease infinite;
}

@keyframes galaxy{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background-image:
radial-gradient(2px 2px at 50px 50px,#fff,transparent),
radial-gradient(2px 2px at 150px 100px,#38bdf8,transparent),
radial-gradient(1px 1px at 250px 150px,#fff,transparent),
radial-gradient(2px 2px at 350px 200px,#8b5cf6,transparent);
background-size:400px 400px;
animation:starsMove 25s linear infinite;
}

@keyframes starsMove{
from{transform:translateY(0);}
to{transform:translateY(-400px);}
}

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
min-height:100vh;
padding:20px;
flex-wrap:wrap;
}

.logo{
width:450px;
max-width:90%;
animation:logoFloat 4s ease-in-out infinite;
filter:
drop-shadow(0 0 20px #38bdf8)
drop-shadow(0 0 50px #8b5cf6);
}

@keyframes logoFloat{
0%{transform:translateY(0);}
25%{transform:translateY(-15px);}
50%{transform:translateY(0);}
75%{transform:translateY(15px);}
100%{transform:translateY(0);}
}

.hero-text{
display:flex;
flex-direction:column;
align-items:flex-start;
justify-content:center;
}

h1{
font-size:110px;
line-height:1;
color:#38bdf8;
text-shadow:
0 0 15px #38bdf8,
0 0 30px #38bdf8,
0 0 60px #38bdf8;
animation:neon 2s infinite alternate;
margin-bottom:25px;
}

@keyframes neon{
from{
text-shadow:
0 0 15px #38bdf8,
0 0 30px #38bdf8,
0 0 60px #38bdf8;
}
to{
text-shadow:
0 0 30px #38bdf8,
0 0 60px #38bdf8,
0 0 120px #38bdf8;
}
}

.buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:15px 30px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.discord{
background:#5865F2;
color:white;
box-shadow:0 0 20px #5865F2;
}

.rules{
background:#8b5cf6;
color:white;
box-shadow:0 0 20px #8b5cf6;
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
}

footer{
padding:25px;
text-align:center;
background:rgba(0,0,0,.25);
font-size:15px;
}

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.hero-text{
align-items:center;
}

.logo{
width:320px;
}

h1{
font-size:70px;
}

}

</style>
</head>

<body>

<div class="stars"></div>

<section class="hero">

<img src="logo.png" alt="Logo Astralys" class="logo">

<div class="hero-text">

<h1>ASTRALYS</h1>

<div class="buttons">

<a href="https://discord.gg/JAq4qahE2A"
class="btn discord"
target="_blank">
💬 Rejoindre le Discord
</a>

<a href="reglement.html"
class="btn rules">
📜 Voir le règlement
</a>

</div>

</div>

</section>

<footer>
© 2026 ASTRALYS - Tous droits réservés<br>
Développement et design du site par <strong>MathiX</strong>
</footer>

</body>
</html>
